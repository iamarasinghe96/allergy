name: Update YouTube Videos

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  push:
    branches: [main]
  workflow_dispatch:          # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch YouTube RSS and save as videos.json
        run: |
          python3 << 'EOF'
          import urllib.request, xml.etree.ElementTree as ET, json, sys

          CHANNEL_ID = 'UC-tbV1cXaZGb7QWR8xWG7Hg'
          url = f'https://www.youtube.com/feeds/videos.xml?channel_id={CHANNEL_ID}'

          try:
              req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
              with urllib.request.urlopen(req, timeout=15) as r:
                  xml_data = r.read()
          except Exception as e:
              print(f'Failed to fetch RSS: {e}', file=sys.stderr)
              sys.exit(1)

          ns = {
              'atom':  'http://www.w3.org/2005/Atom',
              'yt':    'http://www.youtube.com/xml/schemas/2015',
              'media': 'http://search.yahoo.com/mrss/',
          }

          root = ET.fromstring(xml_data)
          videos = []
          for entry in root.findall('atom:entry', ns)[:9]:
              vid_el = entry.find('yt:videoId', ns)
              title_el = entry.find('atom:title', ns)
              if vid_el is None or title_el is None:
                  continue
              desc = ''
              group = entry.find('media:group', ns)
              if group is not None:
                  desc_el = group.find('media:description', ns)
                  if desc_el is not None and desc_el.text:
                      desc = desc_el.text.strip()
              videos.append({'id': vid_el.text, 'title': title_el.text, 'desc': desc})

          with open('videos.json', 'w', encoding='utf-8') as f:
              json.dump(videos, f, ensure_ascii=False, indent=2)

          print(f'Saved {len(videos)} videos to videos.json')
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add videos.json
          git diff --staged --quiet || git commit -m 'chore: update videos.json' && git push
